<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Members — MoneyFlows</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: oklch(14% 0.015 260);
  --surface: oklch(22% 0.02 260 / 0.55);
  --fg: oklch(92% 0.008 260);
  --muted: oklch(60% 0.02 260);
  --border: oklch(100% 0 0 / 0.10);
  --violet: oklch(62% 0.22 290);
  --teal: oklch(65% 0.15 170);
  --coral: oklch(62% 0.18 30);
  --gold: oklch(75% 0.15 85);
  --font-display: 'Outfit', -apple-system, system-ui, sans-serif;
  --font-body: -apple-system, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  --font-size-base: clamp(14px, 3.5vw, 16px);
  --bg-glow: radial-gradient(ellipse 70% 60% at 50% 20%, oklch(65% 0.04 250 / 0.35), transparent 70%);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; min-height: 100vh;
  background: var(--bg);
  color: var(--fg);
  font: var(--font-size-base)/1.5 var(--font-body);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
body {
  background-image: var(--bg-glow);
  background-attachment: fixed;
  padding: 0 16px;
  padding-bottom: calc(80px + env(safe-area-inset-bottom));
}

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 4px;
  min-height: 52px;
}
.back-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  backdrop-filter: blur(8px);
  color: var(--fg);
  display: grid; place-items: center;
  font-size: 20px;
  cursor: pointer;
  transition: transform 0.15s;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
.back-btn:active { transform: scale(0.92); }
.header-title {
  font: 600 18px var(--font-display);
  letter-spacing: -0.01em;
  color: var(--fg);
}

/* Search */
.search-bar {
  margin-bottom: 16px;
}
.search-bar input {
  width: 100%;
  padding: 14px 16px;
  padding-left: 44px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--surface);
  backdrop-filter: blur(12px);
  color: var(--fg);
  font: 14px var(--font-body);
  outline: none;
  -webkit-appearance: none;
  transition: border-color 0.2s;
}
.search-bar input:focus {
  border-color: var(--violet);
  box-shadow: 0 0 0 3px oklch(62% 0.22 290 / 0.15);
}
.search-bar input::placeholder { color: var(--muted); }
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 16px;
  pointer-events: none;
}
.search-wrap { position: relative; }

/* Member grid */
.member-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.member-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 16px 8px;
  border-radius: 16px;
  background: var(--surface);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: transform 0.15s, border-color 0.2s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  min-height: 100px;
}
.member-cell:active { transform: scale(0.95); }
.member-cell:hover { border-color: var(--violet); }
.member-cell.add-cell {
  border: 1px dashed var(--border);
  background: oklch(22% 0.02 260 / 0.3);
  justify-content: center;
  color: var(--muted);
}
.member-cell.add-cell:active { transform: scale(0.95); }
.add-cell .add-icon {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: oklch(62% 0.22 290 / 0.2);
  display: grid; place-items: center;
  font-size: 22px;
  color: var(--violet);
}

.cell-avatar {
  width: 56px; height: 56px;
  border-radius: 50%;
  display: grid; place-items: center;
  font: 700 18px var(--font-display);
  color: #fff;
  flex-shrink: 0;
}
.cell-avatar.efty { background: linear-gradient(135deg, oklch(62% 0.22 290), oklch(50% 0.2 290)); }
.cell-avatar.azam { background: linear-gradient(135deg, oklch(65% 0.15 170), oklch(50% 0.15 170)); }
.cell-avatar.nahar { background: linear-gradient(135deg, oklch(62% 0.18 30), oklch(50% 0.18 30)); }
.cell-avatar.bro { background: linear-gradient(135deg, oklch(75% 0.15 85), oklch(60% 0.15 85)); }

.cell-name {
  font: 500 13px var(--font-body);
  color: var(--fg);
  text-align: center;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.cell-balance {
  font: 600 13px var(--font-mono);
  font-variant-numeric: tabular-nums;
  color: var(--teal);
}

/* Empty state */
.empty-state {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  text-align: center;
  gap: 12px;
}
.empty-state.visible { display: flex; }
.empty-state .empty-icon {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: oklch(62% 0.22 290 / 0.15);
  display: grid; place-items: center;
  font-size: 28px;
  color: var(--violet);
}
.empty-state .empty-title {
  font: 600 16px var(--font-display);
  color: var(--fg);
}
.empty-state .empty-desc {
  font: 400 13px var(--font-body);
  color: var(--muted);
}
.empty-state .empty-btn {
  margin-top: 8px;
  padding: 12px 24px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--violet), oklch(50% 0.2 290));
  color: #fff;
  font: 600 14px var(--font-display);
  cursor: pointer;
  transition: opacity 0.15s;
}
.empty-state .empty-btn:active { opacity: 0.9; }

/* Bottom nav */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 64px;
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 0 8px;
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 200;
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  min-width: 44px; min-height: 44px;
  justify-content: center;
  background: none;
  border: none;
  color: var(--muted);
  font: 400 10px var(--font-body);
  letter-spacing: 0.02em;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.15s;
}
.nav-item .nav-icon { font-size: 20px; line-height: 1; }
.nav-item.active { color: var(--violet); }

/* Add member modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: oklch(0% 0 0 / 0.6);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 300;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-sheet {
  width: 100%;
  max-height: 90%;
  background: var(--bg);
  border-radius: 20px 20px 0 0;
  border: 1px solid var(--border);
  border-bottom: none;
  padding: 20px;
  animation: slideUp 0.35s ease-out;
  overflow-y: auto;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-handle {
  width: 36px; height: 4px;
  border-radius: 2px;
  background: oklch(100% 0 0 / 0.2);
  margin: 0 auto 16px;
}
.modal-title {
  font: 600 16px var(--font-display);
  color: var(--fg);
  margin-bottom: 16px;
}
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block;
  font: 400 11px var(--font-body);
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.form-group input {
  width: 100%;
  padding: 14px 16px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--fg);
  font: 14px var(--font-body);
  outline: none;
  -webkit-appearance: none;
}
.form-group input:focus {
  border-color: var(--violet);
  box-shadow: 0 0 0 3px oklch(62% 0.22 290 / 0.15);
}
.submit-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--violet), oklch(50% 0.2 290));
  color: #fff;
  font: 600 15px var(--font-display);
  cursor: pointer;
  transition: opacity 0.15s;
}
.submit-btn:active { opacity: 0.9; }

.hidden { display: none; }
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="window.location.href='dashboard.html'" aria-label="Back">&#8592;</button>
  <span class="header-title">Members</span>
</div>

<div class="search-bar">
  <div class="search-wrap">
    <span class="search-icon">&#8981;</span>
    <input type="text" id="searchInput" placeholder="Search members..." oninput="filterMembers()" />
  </div>
</div>

<div id="memberGrid" class="member-grid"></div>

<div class="empty-state" id="emptyState">
  <div class="empty-icon">+</div>
  <div class="empty-title">No members yet</div>
  <div class="empty-desc">Add your first family member to start tracking finances together</div>
  <button class="empty-btn" onclick="openAddModal()">Add First Member</button>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-item" onclick="window.location.href='dashboard.html'">
    <span class="nav-icon">&#9632;</span>
    <span>Home</span>
  </button>
  <button class="nav-item active">
    <span class="nav-icon">&#9679;</span>
    <span>Members</span>
  </button>
  <button class="nav-item" onclick="window.location.href='loans.html'">
    <span class="nav-icon">&#9665;</span>
    <span>Loans</span>
  </button>
  <button class="nav-item" onclick="window.location.href='groups.html'">
    <span class="nav-icon">&#9630;</span>
    <span>Groups</span>
  </button>
  <button class="nav-item" onclick="window.location.href='recycle-bin.html'">
    <span class="nav-icon">&#9851;</span>
    <span>Bin</span>
  </button>
</nav>

<!-- Add Member Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Add Member</div>
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="memberName" placeholder="e.g. Alif" />
    </div>
    <div class="form-group">
      <label>Initial Balance (BDT)</label>
      <input type="number" inputmode="numeric" id="memberBalance" placeholder="0" />
    </div>
    <button class="submit-btn" onclick="addMember()">Add Member</button>
  </div>
</div>

<script>
var members = [
  { id: 1, name: 'Efty', balance: 15200, avatar: 'efty', initials: 'Ef' },
  { id: 2, name: 'Azam', balance: 12400, avatar: 'azam', initials: 'Az' },
  { id: 3, name: 'Nahar', balance: 8600, avatar: 'nahar', initials: 'Na' },
  { id: 4, name: 'Bro',  balance: 1000, avatar: 'bro',  initials: 'Br' }
];

function renderMembers(list) {
  var grid = document.getElementById('memberGrid');
  var empty = document.getElementById('emptyState');
  grid.innerHTML = '';

  if (list.length === 0) {
    grid.classList.add('hidden');
    empty.classList.add('visible');
    return;
  }
  grid.classList.remove('hidden');
  empty.classList.remove('visible');

  list.forEach(function(m) {
    var cell = document.createElement('div');
    cell.className = 'member-cell';
    cell.onclick = function() { navigateToProfile(m.name); };
    cell.innerHTML =
      '<div class="cell-avatar ' + m.avatar + '">' + m.initials + '</div>' +
      '<div class="cell-name">' + m.name + '</div>' +
      '<div class="cell-balance">&#2547;' + formatBalance(m.balance) + '</div>';
    grid.appendChild(cell);
  });

  // Add button
  var addCell = document.createElement('div');
  addCell.className = 'member-cell add-cell';
  addCell.onclick = openAddModal;
  addCell.innerHTML = '<div class="add-icon">+</div>';
  grid.appendChild(addCell);
}

function formatBalance(n) {
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
  return String(n);
}

function filterMembers() {
  var q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!q) { renderMembers(members); return; }
  var filtered = members.filter(function(m) { return m.name.toLowerCase().includes(q); });
  renderMembers(filtered);
}

function navigateToProfile(name) {
  // Placeholder: would navigate to member profile
}

function openAddModal() {
  document.getElementById('addModal').classList.add('open');
}

function addMember() {
  var name = document.getElementById('memberName').value.trim();
  var balance = parseInt(document.getElementById('memberBalance').value) || 0;
  if (!name) return;
  var id = members.length + 1;
  var initial = name.substring(0, 2).toUpperCase();
  var colorKeys = ['efty', 'azam', 'nahar', 'bro'];
  var avatar = colorKeys[id % colorKeys.length];
  members.push({ id: id, name: name, balance: balance, avatar: avatar, initials: initial });
  document.getElementById('memberName').value = '';
  document.getElementById('memberBalance').value = '';
  document.getElementById('addModal').classList.remove('open');
  renderMembers(members);
  filterMembers();
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(function(el) {
  el.addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
});

renderMembers(members);
</script>
</body>
</html>
