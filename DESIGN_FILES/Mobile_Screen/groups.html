<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Groups — MoneyFlows</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: oklch(14% 0.015 260);
  --surface: oklch(22% 0.02 260 / 0.55);
  --fg: oklch(92% 0.008 260);
  --muted: oklch(60% 0.02 260);
  --border: oklch(100% 0 0 / 0.10);
  --violet: oklch(62% 0.22 290);
  --teal: oklch(65% 0.15 170);
  --coral: oklch(62% 0.18 30);
  --gold: oklch(75% 0.15 85);
  --purple: oklch(55% 0.18 290);
  --font-display: 'Outfit', -apple-system, system-ui, sans-serif;
  --font-body: -apple-system, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  --font-size-base: clamp(14px, 3.5vw, 16px);
  --bg-glow: radial-gradient(ellipse 70% 60% at 50% 20%, oklch(65% 0.04 250 / 0.35), transparent 70%);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; min-height: 100vh;
  background: var(--bg);
  color: var(--fg);
  font: var(--font-size-base)/1.5 var(--font-body);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
body {
  background-image: var(--bg-glow);
  background-attachment: fixed;
  padding: 0 16px;
  padding-bottom: calc(80px + env(safe-area-inset-bottom));
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 4px;
  min-height: 52px;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 8px;
}
.back-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  backdrop-filter: blur(8px);
  color: var(--fg);
  display: grid; place-items: center;
  font-size: 20px;
  cursor: pointer;
  transition: transform 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
.back-btn:active { transform: scale(0.92); background: oklch(100% 0 0 / 0.08); }
.header-title {
  font: 600 18px var(--font-display);
  letter-spacing: -0.01em;
  color: var(--fg);
}
.add-header-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--violet), oklch(50% 0.2 290));
  color: #fff;
  display: grid; place-items: center;
  font-size: 20px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
  box-shadow: 0 2px 12px oklch(62% 0.22 290 / 0.25);
}
.add-header-btn:active { transform: scale(0.92); }

/* Scroll content */
.scroll-content {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-bottom: 16px;
}

/* Glass card */
.glass {
  background: var(--surface);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
}

/* Search */
.search-bar { margin-bottom: 4px; }
.search-bar input {
  width: 100%;
  padding: 14px 16px;
  padding-left: 44px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--surface);
  backdrop-filter: blur(12px);
  color: var(--fg);
  font: 14px var(--font-body);
  outline: none;
  -webkit-appearance: none;
  transition: border-color 0.2s;
}
.search-bar input:focus {
  border-color: var(--violet);
  box-shadow: 0 0 0 3px oklch(62% 0.22 290 / 0.15);
}
.search-bar input::placeholder { color: var(--muted); }
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 16px;
  pointer-events: none;
}
.search-wrap { position: relative; }

/* Group card */
.group-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-radius: 16px;
  background: var(--surface);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: transform 0.15s, border-color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.group-card:active { transform: scale(0.98); }
.group-card:hover { border-color: var(--violet); }
.group-card .left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.group-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: grid; place-items: center;
  font-size: 20px;
  flex-shrink: 0;
}
.group-icon.emergency { background: oklch(62% 0.18 30 / 0.2); }
.group-icon.savings { background: oklch(65% 0.15 170 / 0.2); }
.group-icon.investment { background: oklch(62% 0.22 290 / 0.2); }
.group-icon.travel { background: oklch(75% 0.15 85 / 0.2); }
.group-info .group-name {
  font: 500 15px var(--font-body);
  color: var(--fg);
}
.group-info .group-meta {
  font: 400 12px var(--font-body);
  color: var(--muted);
  margin-top: 2px;
}
.group-right {
  text-align: right;
}
.group-balance {
  font: 600 15px var(--font-mono);
  font-variant-numeric: tabular-nums;
  color: var(--teal);
}

/* Empty state */
.empty-state {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  text-align: center;
  gap: 12px;
}
.empty-state.visible { display: flex; }
.empty-state .empty-icon {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: oklch(62% 0.22 290 / 0.15);
  display: grid; place-items: center;
  font-size: 28px;
  color: var(--violet);
}
.empty-state .empty-title {
  font: 600 16px var(--font-display);
  color: var(--fg);
}
.empty-state .empty-desc {
  font: 400 13px var(--font-body);
  color: var(--muted);
}
.empty-state .empty-btn {
  margin-top: 8px;
  padding: 12px 24px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--violet), oklch(50% 0.2 290));
  color: #fff;
  font: 600 14px var(--font-display);
  cursor: pointer;
  transition: opacity 0.15s;
}
.empty-state .empty-btn:active { opacity: 0.9; }

/* Bottom nav */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 64px;
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 0 8px;
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 200;
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  min-width: 44px; min-height: 44px;
  justify-content: center;
  background: none;
  border: none;
  color: var(--muted);
  font: 400 10px var(--font-body);
  letter-spacing: 0.02em;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.15s;
}
.nav-item .nav-icon { font-size: 20px; line-height: 1; }
.nav-item.active { color: var(--violet); }

/* Bottom sheet */
.sheet-overlay {
  position: fixed;
  inset: 0;
  background: oklch(0% 0 0 / 0.6);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 300;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.sheet-overlay.open { display: flex; }
.sheet-panel {
  width: 100%;
  max-height: 90%;
  background: var(--bg);
  border-radius: 20px 20px 0 0;
  border: 1px solid var(--border);
  border-bottom: none;
  padding: 20px;
  animation: slideUp 0.35s ease-out;
  overflow-y: auto;
  transform: translateY(0);
  transition: transform 0.35s ease-out;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.sheet-handle {
  width: 36px; height: 4px;
  border-radius: 2px;
  background: oklch(100% 0 0 / 0.2);
  margin: 0 auto 16px;
  cursor: grab;
  touch-action: none;
}
.sheet-title {
  font: 600 18px var(--font-display);
  letter-spacing: -0.01em;
  color: var(--fg);
  margin-bottom: 16px;
}

/* Group detail sheet */
.sheet-stat {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.sheet-stat:last-child { border-bottom: none; }
.sheet-stat .stat-name {
  font: 400 14px var(--font-body);
  color: var(--fg);
}
.sheet-stat .stat-balance {
  font: 500 14px var(--font-mono);
  font-variant-numeric: tabular-nums;
  color: var(--teal);
}
.sheet-total {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 0 12px;
  margin-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.sheet-total .total-label {
  font: 500 14px var(--font-body);
  color: var(--fg);
}
.sheet-total .total-value {
  font: 600 18px var(--font-mono);
  font-variant-numeric: tabular-nums;
  color: var(--teal);
}
.sheet-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 8px;
}
.sheet-action-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font: 500 14px var(--font-body);
  cursor: pointer;
  transition: opacity 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.sheet-action-btn:active { opacity: 0.85; }
.sheet-action-btn.primary {
  background: linear-gradient(135deg, var(--violet), oklch(50% 0.2 290));
  color: #fff;
}
.sheet-action-btn.secondary {
  background: var(--surface);
  color: var(--muted);
  border: 1px solid var(--border);
}
.sheet-action-btn.danger {
  background: oklch(62% 0.18 30 / 0.15);
  color: var(--coral);
}

/* Form modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: oklch(0% 0 0 / 0.6);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 400;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-sheet {
  width: 100%;
  max-height: 90%;
  background: var(--bg);
  border-radius: 20px 20px 0 0;
  border: 1px solid var(--border);
  border-bottom: none;
  padding: 20px;
  animation: slideUp 0.35s ease-out;
  overflow-y: auto;
}
.modal-handle {
  width: 36px; height: 4px;
  border-radius: 2px;
  background: oklch(100% 0 0 / 0.2);
  margin: 0 auto 16px;
}
.modal-title {
  font: 600 16px var(--font-display);
  color: var(--fg);
  margin-bottom: 16px;
}
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block;
  font: 400 11px var(--font-body);
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.form-group input, .form-group select {
  width: 100%;
  padding: 14px 16px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--fg);
  font: 14px var(--font-body);
  outline: none;
  -webkit-appearance: none;
}
.form-group input:focus, .form-group select:focus {
  border-color: var(--violet);
  box-shadow: 0 0 0 3px oklch(62% 0.22 290 / 0.15);
}
.submit-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--violet), oklch(50% 0.2 290));
  color: #fff;
  font: 600 15px var(--font-display);
  cursor: pointer;
  transition: opacity 0.15s;
}
.submit-btn:active { opacity: 0.9; }

.hidden { display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <button class="back-btn" onclick="window.location.href='dashboard.html'" aria-label="Back">&#8592;</button>
    <span class="header-title">Groups</span>
  </div>
  <button class="add-header-btn" onclick="openCreateGroup()" aria-label="Add Group">+</button>
</div>

<div class="search-bar">
  <div class="search-wrap">
    <span class="search-icon">&#8981;</span>
    <input type="text" id="searchInput" placeholder="Search groups..." oninput="filterGroups()" />
  </div>
</div>

<div id="groupList" class="scroll-content"></div>

<div class="empty-state" id="emptyState">
  <div class="empty-icon">&#9632;</div>
  <div class="empty-title">No groups yet</div>
  <div class="empty-desc">Create a group to organize accounts — Emergency fund, Savings, Travel budget, and more</div>
  <button class="empty-btn" onclick="openCreateGroup()">Create First Group</button>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-item" onclick="window.location.href='dashboard.html'">
    <span class="nav-icon">&#9632;</span>
    <span>Home</span>
  </button>
  <button class="nav-item" onclick="window.location.href='member.html'">
    <span class="nav-icon">&#9679;</span>
    <span>Members</span>
  </button>
  <button class="nav-item" onclick="window.location.href='loans.html'">
    <span class="nav-icon">&#9665;</span>
    <span>Loans</span>
  </button>
  <button class="nav-item active">
    <span class="nav-icon">&#9630;</span>
    <span>Groups</span>
  </button>
  <button class="nav-item" onclick="window.location.href='recycle-bin.html'">
    <span class="nav-icon">&#9851;</span>
    <span>Bin</span>
  </button>
</nav>

<!-- Group Detail Sheet -->
<div class="sheet-overlay" id="groupSheet">
  <div class="sheet-panel" id="groupSheetPanel">
    <div class="sheet-handle" id="sheetHandle"></div>
    <div class="sheet-title" id="sheetGroupName">Emergency Fund</div>
    <div class="sheet-total">
      <span class="total-label">Total Balance</span>
      <span class="total-value" id="sheetTotal">&#2547;12,450</span>
    </div>
    <div id="sheetAccountList"></div>
    <div class="sheet-actions">
      <button class="sheet-action-btn primary" onclick="viewLedger()">View Ledger</button>
      <button class="sheet-action-btn secondary" onclick="editGroup()">Edit Group</button>
      <button class="sheet-action-btn danger" onclick="deleteGroup()">Delete Group</button>
    </div>
  </div>
</div>

<!-- Create/Edit Group Modal -->
<div class="modal-overlay" id="groupFormModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="groupFormTitle">Create Group</div>
    <div class="form-group">
      <label>Group Name</label>
      <input type="text" id="groupNameInput" placeholder="e.g. Emergency Fund" />
    </div>
    <div class="form-group">
      <label>Icon</label>
      <select id="groupIconInput">
        <option value="emergency">Emergency</option>
        <option value="savings">Savings</option>
        <option value="investment">Investment</option>
        <option value="travel">Travel</option>
      </select>
    </div>
    <button class="submit-btn" id="groupFormBtn" onclick="saveGroup()">Create Group</button>
  </div>
</div>

<script>
/* ===== DATA ===== */
var groups = [
  { id: 'g1', name: 'Emergency Fund', icon: 'emergency', accounts: [
    { name: 'Cash', balance: 8450 },
    { name: 'bKash', balance: 4000 }
  ]},
  { id: 'g2', name: 'Family Savings', icon: 'savings', accounts: [
    { name: 'Brac Bank', balance: 6200 },
    { name: 'Cash', balance: 2000 }
  ]},
  { id: 'g3', name: 'Investment Pool', icon: 'investment', accounts: [
    { name: 'Business Cash', balance: 3500 },
    { name: 'Brac Bank', balance: 4700 }
  ]}
];

var editingGroupId = null;

/* ===== RENDER ===== */
function renderGroups(list) {
  var container = document.getElementById('groupList');
  var empty = document.getElementById('emptyState');
  container.innerHTML = '';

  if (list.length === 0) {
    container.classList.add('hidden');
    empty.classList.add('visible');
    return;
  }
  container.classList.remove('hidden');
  empty.classList.remove('visible');

  list.forEach(function(g) {
    var total = g.accounts.reduce(function(s, a) { return s + a.balance; }, 0);
    var card = document.createElement('div');
    card.className = 'group-card';
    card.onclick = function() { openGroupSheet(g); };
    card.innerHTML =
      '<div class="left">' +
        '<div class="group-icon ' + g.icon + '">' + getIconChar(g.icon) + '</div>' +
        '<div class="group-info">' +
          '<div class="group-name">' + g.name + '</div>' +
          '<div class="group-meta">' + g.accounts.length + ' account' + (g.accounts.length !== 1 ? 's' : '') + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="group-right">' +
        '<div class="group-balance">&#2547;' + formatNum(total) + '</div>' +
      '</div>';
    container.appendChild(card);
  });
}

function getIconChar(type) {
  var map = { emergency: '&#9888;', savings: '&#128176;', investment: '&#128200;', travel: '&#9992;' };
  return map[type] || '&#9632;';
}

function formatNum(n) {
  return n.toLocaleString('en-IN');
}

/* ===== SEARCH ===== */
function filterGroups() {
  var q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!q) { renderGroups(groups); return; }
  var filtered = groups.filter(function(g) { return g.name.toLowerCase().includes(q); });
  renderGroups(filtered);
}

/* ===== GROUP SHEET ===== */
var currentGroup = null;

function openGroupSheet(g) {
  currentGroup = g;
  document.getElementById('sheetGroupName').textContent = g.name;
  var total = g.accounts.reduce(function(s, a) { return s + a.balance; }, 0);
  document.getElementById('sheetTotal').innerHTML = '&#2547;' + formatNum(total);

  var list = document.getElementById('sheetAccountList');
  list.innerHTML = '';
  g.accounts.forEach(function(acct) {
    var row = document.createElement('div');
    row.className = 'sheet-stat';
    row.innerHTML =
      '<span class="stat-name">' + acct.name + '</span>' +
      '<span class="stat-balance">&#2547;' + formatNum(acct.balance) + '</span>';
    list.appendChild(row);
  });

  document.getElementById('groupSheet').classList.add('open');
  document.getElementById('groupSheetPanel').style.transform = 'translateY(0)';
}

/* Drag-to-dismiss sheet */
(function() {
  var panel = document.getElementById('groupSheetPanel');
  var handle = document.getElementById('sheetHandle');
  var startY = 0, currentY = 0, dragging = false;

  handle.addEventListener('touchstart', function(e) {
    startY = e.touches[0].clientY;
    dragging = true;
    panel.style.transition = 'none';
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!dragging) return;
    currentY = e.touches[0].clientY;
    var diff = currentY - startY;
    if (diff > 0) panel.style.transform = 'translateY(' + diff + 'px)';
  }, { passive: true });

  document.addEventListener('touchend', function() {
    if (!dragging) return;
    dragging = false;
    panel.style.transition = 'transform 0.35s ease-out';
    var diff = currentY - startY;
    if (diff > 80) {
      closeSheet();
    } else {
      panel.style.transform = 'translateY(0)';
    }
    startY = 0; currentY = 0;
  }, { passive: true });
})();

function closeSheet() {
  document.getElementById('groupSheet').classList.remove('open');
  document.getElementById('groupSheetPanel').style.transform = 'translateY(0)';
}

function viewLedger() {
  closeSheet();
  window.location.href = 'group-ledger.html';
}

function editGroup() {
  if (!currentGroup) return;
  editingGroupId = currentGroup.id;
  document.getElementById('groupFormTitle').textContent = 'Edit Group';
  document.getElementById('groupNameInput').value = currentGroup.name;
  document.getElementById('groupIconInput').value = currentGroup.icon;
  document.getElementById('groupFormBtn').textContent = 'Save';
  document.getElementById('groupFormModal').classList.add('open');
  closeSheet();
}

function deleteGroup() {
  if (!currentGroup) return;
  var idx = groups.findIndex(function(g) { return g.id === currentGroup.id; });
  if (idx > -1) groups.splice(idx, 1);
  closeSheet();
  renderGroups(groups);
}

/* ===== CREATE / EDIT GROUP ===== */
function openCreateGroup() {
  editingGroupId = null;
  document.getElementById('groupFormTitle').textContent = 'Create Group';
  document.getElementById('groupNameInput').value = '';
  document.getElementById('groupIconInput').value = 'emergency';
  document.getElementById('groupFormBtn').textContent = 'Create Group';
  document.getElementById('groupFormModal').classList.add('open');
}

function saveGroup() {
  var name = document.getElementById('groupNameInput').value.trim();
  var icon = document.getElementById('groupIconInput').value;
  if (!name) return;

  if (editingGroupId) {
    var g = groups.find(function(g) { return g.id === editingGroupId; });
    if (g) { g.name = name; g.icon = icon; }
  } else {
    groups.push({
      id: 'g' + Date.now(),
      name: name,
      icon: icon,
      accounts: []
    });
  }

  document.getElementById('groupNameInput').value = '';
  document.getElementById('groupFormModal').classList.remove('open');
  renderGroups(groups);
  filterGroups();
}

/* ===== CLOSE ON OVERLAY ===== */
document.querySelectorAll('.modal-overlay, .sheet-overlay').forEach(function(el) {
  el.addEventListener('click', function(e) {
    if (e.target === this) {
      this.classList.remove('open');
      document.getElementById('groupSheetPanel').style.transform = 'translateY(0)';
    }
  });
});

/* ===== INIT ===== */
renderGroups(groups);
</script>
</body>
</html>
